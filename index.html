<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Radar · AI-nyheder på letlæst dansk</title>
<meta name="description" content="Dagens AI-nyheder omskrevet til kort, letlæst dansk – med kunst til hver historie.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='38' fill='%235b4bf0'/><circle cx='50' cy='50' r='16' fill='white'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   AI RADAR · magasin-design
   Farver, skrifter og afstande styres af variablerne i :root.
   ================================================================ */
:root {
  --bg: #f4f2ec;            /* varm papirfarve */
  --bg-kort: #ffffff;
  --blaek: #191714;
  --blaek-svag: #6d675d;
  --linje: #e2ddd2;
  --accent: #5b4bf0;
  --accent-svag: #ecebfd;
  --radius: 18px;
  --skygge: 0 2px 4px rgba(25,23,20,.05), 0 12px 32px rgba(25,23,20,.07);
  --font-ui: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: "Fraunces", Georgia, serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--blaek);
  line-height: 1.55;
  transition: background .3s, color .3s;
}
a { color: inherit; }

/* ---------- Topbar ---------- */
.topbar {
  position: sticky; top: 0; z-index: 90;
  background: color-mix(in srgb, var(--bg) 86%, transparent);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--linje);
}
.topbar-inner {
  margin: 0 auto; padding: 14px 28px;
  display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
}
.brand { display: flex; align-items: baseline; gap: 10px; text-decoration: none; }
.brand-navn {
  font-family: var(--font-display); font-weight: 900; font-size: 26px;
  letter-spacing: -.03em;
}
.brand-navn em { font-style: normal; color: var(--accent); }
.brand-dato {
  font-size: 12px; color: var(--blaek-svag); font-weight: 500;
  text-transform: capitalize; display: none;
}
@media (min-width: 720px) { .brand-dato { display: inline; } }
.puls {
  width: 9px; height: 9px; border-radius: 50%; background: var(--accent);
  align-self: center; box-shadow: 0 0 0 4px var(--accent-svag);
  animation: puls 2.4s infinite;
}
@keyframes puls {
  0%,100% { box-shadow: 0 0 0 3px var(--accent-svag); }
  50%     { box-shadow: 0 0 0 8px var(--accent-svag); }
}
.sog { flex: 1; min-width: 150px; max-width: 320px; margin-left: auto; position: relative; }
.sog input {
  width: 100%; padding: 9px 16px 9px 38px;
  border: 1px solid var(--linje); border-radius: 999px;
  background: var(--bg-kort); color: var(--blaek);
  font-size: 14px; font-family: inherit; outline: none;
  transition: border .2s, box-shadow .2s;
}
.sog input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-svag); }
.sog svg {
  position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  width: 15px; height: 15px; stroke: var(--blaek-svag); fill: none;
  stroke-width: 2.2; stroke-linecap: round;
}
.visning-skift {
  display: flex; border: 1px solid var(--linje); border-radius: 999px;
  background: var(--bg-kort); overflow: hidden;
}
.visning-skift button {
  border: 0; background: transparent; color: var(--blaek-svag);
  font-family: inherit; font-size: 12.5px; font-weight: 700;
  padding: 9px 14px; cursor: pointer; display: flex; gap: 6px; align-items: center;
  transition: all .18s;
}
.visning-skift button.aktiv { background: var(--blaek); color: var(--bg); }

/* ---------- Filtre (bor i topbaren) ---------- */
.filtre { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.pill {
  border: 1px solid var(--linje); background: var(--bg-kort);
  color: var(--blaek-svag); font-size: 12.5px; font-weight: 600;
  padding: 6px 13px; border-radius: 999px; cursor: pointer;
  font-family: inherit; transition: all .18s;
}
.pill:hover { border-color: var(--accent); color: var(--accent); }
.pill.aktiv { background: var(--blaek); border-color: var(--blaek); color: var(--bg); }

/* ---------- Hero ---------- */
.wrap { margin: 0 auto; padding: 20px 28px 70px; }
.hero {
  display: grid; grid-template-columns: 1.15fr 1fr; gap: 0;
  background: var(--bg-kort); border: 1px solid var(--linje);
  border-radius: calc(var(--radius) + 6px); overflow: hidden;
  box-shadow: var(--skygge); margin-bottom: 34px;
  text-decoration: none; transition: transform .25s, box-shadow .25s;
  animation: ind .5s ease both;
}
.hero:hover { transform: translateY(-4px); }
.hero-art { min-height: 340px; position: relative; }
.hero-art svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.hero-tekst { padding: 42px 44px; display: flex; flex-direction: column; gap: 16px; justify-content: center; }
.kicker {
  font-size: 11.5px; font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase; color: var(--accent);
  display: flex; align-items: center; gap: 8px;
}
.kicker .adskil { color: var(--blaek-svag); font-weight: 400; letter-spacing: 0; text-transform: none; }
.hero-tekst h1 {
  font-family: var(--font-display); font-weight: 900;
  font-size: clamp(28px, 3.6vw, 44px); line-height: 1.06; letter-spacing: -.02em;
}
.hero-tekst p { font-size: 16.5px; line-height: 1.6; color: var(--blaek-svag); max-width: 46ch; }
.meta { display: flex; align-items: center; gap: 14px; font-size: 12.5px; color: var(--blaek-svag); font-weight: 500; }
.laes {
  color: var(--accent); font-weight: 700; font-size: 13.5px;
  display: inline-flex; align-items: center; gap: 5px; text-decoration: none;
}
.laes::after { content: "→"; transition: transform .2s; }
.hero:hover .laes::after, .kort:hover .laes::after { transform: translateX(4px); }

@media (max-width: 860px) {
  .hero { grid-template-columns: 1fr; }
  .hero-art { min-height: 220px; }
  .hero-tekst { padding: 26px 24px 30px; }
}

/* ---------- Sektionstitel ---------- */
.sektion-titel {
  font-family: var(--font-display); font-weight: 800; font-size: 22px;
  letter-spacing: -.01em; margin: 8px 0 18px;
  display: flex; align-items: center; gap: 14px;
}
.sektion-titel::after { content: ""; flex: 1; height: 1px; background: var(--linje); }

/* ---------- Grid ---------- */
.grid {
  display: grid; gap: 22px;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
}
.kort {
  background: var(--bg-kort); border: 1px solid var(--linje);
  border-radius: var(--radius); overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: var(--skygge); text-decoration: none;
  transition: transform .22s, box-shadow .22s;
  animation: ind .45s ease both;
}
.kort:hover { transform: translateY(-4px); }
.kort-art { aspect-ratio: 16 / 9; position: relative; overflow: hidden; }
.kort-art svg { position: absolute; inset: 0; width: 100%; height: 100%; transition: transform .5s ease; }
.kort:hover .kort-art svg { transform: scale(1.05); }
.kort-krop { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
.kort h2 {
  font-family: var(--font-display); font-weight: 800;
  font-size: 17.5px; line-height: 1.22; letter-spacing: -.015em;
}
.kort p { font-size: 13.5px; color: var(--blaek-svag); flex: 1; }
.kort .meta { margin-top: 2px; }
.kort.stor { grid-column: span 2; }
.kort.stor .kort-art { aspect-ratio: 21 / 9; }
.kort.stor h2 { font-size: 26px; }
@media (max-width: 700px) { .kort.stor { grid-column: span 1; } .kort.stor .kort-art { aspect-ratio: 16/9; } }

.tid-pille {
  position: absolute; right: 8px; bottom: 8px; z-index: 2;
  background: rgba(255,255,255,.94); color: #191714;
  font-size: 10.5px; font-weight: 600; padding: 3px 9px; border-radius: 999px;
  box-shadow: 0 1px 4px rgba(0,0,0,.18);
}
.art-chips { position: absolute; left: 8px; top: 8px; z-index: 2; display: flex; gap: 5px; }
.art-chips span { margin-left: 0 !important; box-shadow: 0 1px 4px rgba(0,0,0,.18); }
.vigtig-chip {
  font-size: 9.5px; font-weight: 800; letter-spacing: .04em;
  background: #f4b400; color: #191714;
  border-radius: 5px; padding: 2px 7px; margin-left: 6px; white-space: nowrap;
}
.flere-chip {
  font-size: 9.5px; font-weight: 800; letter-spacing: .04em;
  background: var(--blaek); color: var(--bg);
  border-radius: 5px; padding: 2px 7px; margin-left: 6px; white-space: nowrap;
}
.en-chip {
  font-size: 9.5px; font-weight: 800; letter-spacing: .08em;
  background: var(--accent-svag); color: var(--accent);
  border-radius: 5px; padding: 2px 6px; vertical-align: 2px; margin-left: 6px;
}

@keyframes ind { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

/* ---------- KOMPAKT OVERBLIK ---------- */
.mini-hero {
  display: flex; gap: 0; background: var(--bg-kort);
  border: 1px solid var(--linje); border-radius: var(--radius);
  overflow: hidden; box-shadow: var(--skygge); margin-bottom: 20px;
  text-decoration: none; transition: transform .2s; animation: ind .4s ease both;
}
.mini-hero:hover { transform: translateY(-2px); }
.mini-hero-art { width: 300px; min-height: 150px; position: relative; flex-shrink: 0; }
.mini-hero-art svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.mini-hero-tekst { padding: 18px 26px; display: flex; flex-direction: column; gap: 7px; justify-content: center; }
.mini-hero-tekst h1 {
  font-family: var(--font-display); font-weight: 900;
  font-size: clamp(19px, 2vw, 26px); line-height: 1.12; letter-spacing: -.015em;
}
.mini-hero-tekst p { font-size: 13.5px; color: var(--blaek-svag); max-width: 78ch; }
@media (max-width: 700px) { .mini-hero-art { width: 110px; } .mini-hero-tekst { padding: 14px 16px; } }

.tavle {
  display: grid; gap: 16px;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
}
.raekke {
  display: flex; flex-direction: column;
  background: var(--bg-kort); border: 1px solid var(--linje);
  border-radius: 14px; overflow: hidden;
  text-decoration: none; transition: transform .15s, border-color .15s, box-shadow .15s;
  animation: ind .3s ease both;
}
.raekke:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: var(--skygge); }
.raekke-billede { position: relative; aspect-ratio: 16 / 9; overflow: hidden; }
.raekke-billede svg, .raekke-billede img { position: absolute; inset: 0; width: 100%; height: 100%; transition: transform .4s ease; }
.raekke:hover .raekke-billede svg, .raekke:hover .raekke-billede img { transform: scale(1.04); }
.raekke-tekst { min-width: 0; display: flex; flex-direction: column; gap: 4px; padding: 10px 12px 12px; flex: 1; }
.raekke-tekst .kicker { font-size: 9.5px; letter-spacing: .1em; flex-wrap: wrap; }
.raekke h3 {
  font-family: var(--font-display); font-weight: 800;
  font-size: 15.5px; line-height: 1.28; letter-spacing: -.01em;
}
.raekke .tid { margin-top: auto; padding-top: 4px; }
/* Svæve-popup med det ultrakorte resumé - flyder OVER alt, intet rykker sig */
#tip {
  position: fixed; z-index: 300; max-width: 380px;
  background: var(--bg-kort); color: var(--blaek);
  border: 1px solid var(--linje); border-radius: 12px;
  padding: 12px 15px; font-size: 13px; line-height: 1.55;
  box-shadow: 0 12px 40px rgba(0,0,0,.35);
  pointer-events: none; opacity: 0; transform: translateY(4px);
  transition: opacity .15s ease, transform .15s ease;
}
#tip.synlig { opacity: 1; transform: none; }
#tip .tip-kilde { font-size: 10.5px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
.raekke .tid { font-size: 10.5px; color: var(--blaek-svag); font-weight: 500; }

/* ---------- LÆSEVISNING (artikel-modal) ---------- */
.laeser-bag {
  position: fixed; inset: 0; z-index: 200;
  background: color-mix(in srgb, var(--blaek) 45%, transparent);
  backdrop-filter: blur(6px);
  display: none; align-items: flex-start; justify-content: center;
  overflow-y: auto; padding: 4vh 16px 6vh;
}
.laeser-bag.aaben { display: flex; }
.laeser {
  background: var(--bg-kort); border: 1px solid var(--linje);
  border-radius: 22px; width: calc(100vw - 48px); max-width: none;
  box-shadow: 0 30px 80px rgba(0,0,0,.35); overflow: hidden;
  display: grid; grid-template-columns: minmax(280px, 36%) 1fr;
  animation: laeserInd .3s cubic-bezier(.2,.9,.3,1) both;
}
@keyframes laeserInd { from { opacity: 0; transform: translateY(26px) scale(.98); } to { opacity: 1; transform: none; } }
.laeser-art { min-height: 320px; height: 100%; position: relative; }
.laeser-art svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.laeser-luk {
  position: absolute; top: 14px; right: 14px; z-index: 2;
  width: 36px; height: 36px; border-radius: 50%; border: 0; cursor: pointer;
  background: rgba(0,0,0,.35); color: #fff; font-size: 17px;
  display: grid; place-items: center; backdrop-filter: blur(4px);
  transition: transform .15s, background .15s;
}
.laeser-luk:hover { transform: rotate(90deg); background: rgba(0,0,0,.55); }
.laeser-krop { padding: 36px 48px 40px; min-width: 0; }
.laeser-indhold { display: flex; gap: 36px; align-items: flex-start; flex-wrap: wrap; }
.laeser-indhold .laeser-brief { flex: 1 1 420px; max-width: 75ch; }
.laeser-indhold .laeser-pointer { flex: 0 1 320px; margin: 0; }
.laeser-krop h1 {
  font-family: var(--font-display); font-weight: 900;
  font-size: clamp(24px, 4vw, 32px); line-height: 1.12; letter-spacing: -.02em;
  margin: 10px 0 14px;
}
.laeser-brief { font-size: 16px; line-height: 1.75; color: var(--blaek); }
.laeser-brief p { margin-bottom: 14px; }
.laeser-pointer { margin: 20px 0 4px; padding: 18px 22px;
  background: var(--accent-svag); border-radius: 14px; }
.laeser-sektion {
  font-family: var(--font-display); font-weight: 800; font-size: 17px;
  margin: 22px 0 10px; letter-spacing: -.01em;
}
.laeser-detaljer { list-style: none; margin: 0 0 4px; }
.laeser-detaljer li {
  font-size: 14.5px; line-height: 1.6; padding: 7px 0 7px 26px;
  position: relative; border-bottom: 1px dashed var(--linje);
}
.laeser-detaljer li:last-child { border-bottom: 0; }
.laeser-detaljer li::before { content: "•"; position: absolute; left: 8px; color: var(--accent); font-weight: 800; }
.laeser-betydning {
  background: var(--accent-svag); border-left: 3px solid var(--accent);
  border-radius: 0 12px 12px 0; padding: 14px 18px;
  font-size: 15px; line-height: 1.65; margin-top: 6px;
}
.laeser-pointer h4 {
  font-size: 11px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 10px;
}
.laeser-pointer ul { list-style: none; }
.laeser-pointer li {
  font-size: 14px; padding-left: 22px; position: relative; margin-bottom: 7px; line-height: 1.5;
}
.laeser-pointer li::before { content: "→"; position: absolute; left: 0; color: var(--accent); font-weight: 700; }
.laeser-bund {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--linje); flex-wrap: wrap;
}
.kilde-knap {
  background: var(--blaek); color: var(--bg); text-decoration: none;
  font-size: 13px; font-weight: 700; padding: 10px 18px; border-radius: 999px;
  transition: transform .15s;
}
.kilde-knap:hover { transform: translateY(-2px); }
.laeser-note { font-size: 12.5px; color: var(--blaek-svag); font-style: italic; margin-top: 14px; }
@media (max-width: 900px) {
  .laeser { grid-template-columns: 1fr; width: calc(100vw - 24px); }
  .laeser-art { min-height: 160px; height: 160px; }
  .laeser-krop { padding: 22px 20px 26px; }
}

.bench-kort {
  background: var(--bg-kort); border: 1px solid var(--linje);
  border-radius: var(--radius); box-shadow: var(--skygge);
  overflow: hidden; animation: ind .4s ease both;
}
.bench-tabel { width: 100%; border-collapse: collapse; font-size: 14px; }
.bench-tabel th {
  text-align: left; font-size: 11px; font-weight: 800; letter-spacing: .09em;
  text-transform: uppercase; color: var(--blaek-svag);
  padding: 14px 18px; border-bottom: 2px solid var(--linje);
  cursor: pointer; user-select: none; white-space: nowrap;
  position: sticky; top: 0; background: var(--bg-kort);
}
.bench-tabel th:hover { color: var(--accent); }
.bench-tabel th .pil { color: var(--accent); margin-left: 4px; }
.bench-tabel td { padding: 11px 18px; border-bottom: 1px solid var(--linje); }
.bench-tabel tr:last-child td { border-bottom: 0; }
.bench-tabel tbody tr:hover { background: var(--accent-svag); }
.bench-navn { font-weight: 700; }
.bench-udbyder { color: var(--blaek-svag); font-size: 12.5px; }
.bench-indeks { font-weight: 800; font-size: 15px; }
.bench-top { color: var(--accent); }
.bench-kredit {
  padding: 14px 18px; font-size: 12px; color: var(--blaek-svag);
  border-top: 1px solid var(--linje);
}
.bench-kredit a { color: var(--accent); }

.tom { text-align: center; padding: 70px 20px; color: var(--blaek-svag); font-size: 15px; }
.note {
  background: var(--accent-svag); border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
  color: var(--blaek); border-radius: var(--radius);
  padding: 14px 20px; font-size: 13.5px; margin-bottom: 26px;
}
footer {
  border-top: 1px solid var(--linje); padding: 26px; text-align: center;
  font-size: 13px; color: var(--blaek-svag);
}
footer a { color: var(--accent); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="#">
      <span class="puls"></span>
      <span class="brand-navn">AI<em>Radar</em></span>
      <span class="brand-dato" id="datoIdag"></span>
    </a>
    <div class="filtre" id="filtre"></div>
    <div class="sog">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
      <input id="sogefelt" type="search" placeholder="Søg i nyhederne …">
    </div>
    <div class="visning-skift" id="sortSkift" title="Sortering">
      <button data-sort="vigtigst" class="aktiv">★ Vigtigst</button>
      <button data-sort="nyeste">Nyeste</button>
    </div>
    <div class="visning-skift" id="visningSkift" title="Skift visning">
      <button data-visning="kompakt" class="aktiv">☰ Overblik</button>
      <button data-visning="magasin">▦ Magasin</button>
      <button data-visning="benchmarks">▤ Benchmarks</button>
    </div>
  </div>
</div>

<main class="wrap">
  <div id="indhold"><div class="tom">Henter nyheder …</div></div>
</main>

<div id="tip"></div>

<div class="laeser-bag" id="laeserBag" role="dialog" aria-modal="true">
  <article class="laeser" id="laeserBoks"></article>
</div>

<footer>
  Nyheder samles automatisk og omskrives til letlæst dansk med AI ·
  Kunstværkerne er genereret unikt til hver historie ·
  <a href="https://github.com/freaksenfreakshow-max/ai-radar">Koden på GitHub</a>
</footer>

<script>
/* ================================================================
   AI RADAR · logik
   1) hent data/articles.json  2) tegn hero + mosaik-grid
   3) generativ kunst pr. artikel (deterministisk ud fra titlen)
   ================================================================ */

let artikler = [];
let aktivKategori = "Alle";
let sogeTekst = "";
let visning = "kompakt";     // "kompakt" = tæt overblik · "magasin" = store kort
let sortering = "vigtigst";  // "vigtigst" = AI-prioritet · "nyeste" = ren kronologi
let benchData = null;
let benchSort = { felt: "indeks", retning: -1 };

const indhold = document.getElementById("indhold");
const filtreEl = document.getElementById("filtre");

/* ---------- Generativ kunst ----------
   Hver artikel får sit eget lille kunstværk. Samme artikel giver altid
   samme billede (hash af titlen styrer form og farver), så siden er rolig. */

const PALETTER = {
  "Lanceringer":     [["#5b4bf0","#9f8bff","#ffd166"], ["#4338ca","#7c6cff","#ff8fa3"]],
  "Benchmarks":      [["#0ea5e9","#67e8f9","#5b4bf0"], ["#0284c7","#38bdf8","#fde047"]],
  "Hverdags-AI":     [["#84cc16","#34d399","#0ea5e9"], ["#65a30d","#a3e635","#5b4bf0"]],
  "Penge & marked":  [["#f59e0b","#ff7847","#5b4bf0"], ["#ea580c","#fbbf24","#312e81"]],
  "Politik & jura":  [["#e0475b","#ff9d7e","#5b4bf0"], ["#be123c","#fb7185","#fde68a"]],
  "Samfund & etik":  [["#8b5cf6","#ec4899","#38bdf8"], ["#7c3aed","#f472b6","#fbbf24"]],
  "Forskning":       [["#0d9488","#34d399","#a3e635"], ["#0f766e","#5eead4","#5b4bf0"]],
  "Andet":           [["#64748b","#94a3b8","#5b4bf0"], ["#475569","#cbd5e1","#ffd166"]],
};

function hash(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
// lille deterministisk talgenerator (mulberry32) - giver altid tal i [0;1)
function rng(seed) {
  let t = (seed >>> 0) || 1;
  return () => {
    t += 0x6D2B79F5;
    let r = Math.imul(t ^ (t >>> 15), 1 | t);
    r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
}

function visuel(a, id) {
  if (a.billede) return `<img src="${esc(a.billede)}" alt="" loading="lazy"
    style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">`;
  return kunst(a, id);
}

function kunst(a, id) {
  const h = hash(a.titel + a.kilde);
  const r = rng(h);
  const pal = (PALETTER[a.kategori] || PALETTER["Andet"])[h % 2];
  const [c1, c2, c3] = pal;
  const variant = h % 4;
  const gid = "g" + id, fid = "f" + id;
  let former = "";

  if (variant === 0) {            // BØLGER
    for (let i = 0; i < 4; i++) {
      const y = 30 + i * 22 + r() * 10, amp = 10 + r() * 22, fase = r() * 100;
      let d = `M -10 ${y}`;
      for (let x = 0; x <= 420; x += 20) d += ` Q ${x + 10} ${y + Math.sin((x + fase) / 30) * amp}, ${x + 20} ${y}`;
      former += `<path d="${d}" fill="none" stroke="${i % 2 ? c3 : "#ffffff"}" stroke-opacity="${.5 - i * .08}" stroke-width="${2.5 + r() * 3}"/>`;
    }
    former += `<circle cx="${300 + r() * 80}" cy="${35 + r() * 40}" r="${16 + r() * 14}" fill="${c3}" opacity=".9"/>`;
  } else if (variant === 1) {     // BUER
    const cx = 60 + r() * 280, cy = 100 + r() * 60;
    for (let i = 6; i > 0; i--) {
      former += `<circle cx="${cx}" cy="${cy}" r="${i * (16 + r() * 6)}" fill="none" stroke="${i % 2 ? "#ffffff" : c3}" stroke-opacity="${.16 + i * .05}" stroke-width="${5 + r() * 5}"/>`;
    }
    former += `<circle cx="${cx}" cy="${cy}" r="10" fill="#ffffff" opacity=".95"/>`;
  } else if (variant === 2) {     // BLOBBER
    for (let i = 0; i < 5; i++) {
      former += `<circle cx="${r() * 400}" cy="${r() * 200}" r="${34 + r() * 55}" fill="${[c2, c3, "#ffffff"][i % 3]}" opacity="${.2 + r() * .35}" filter="url(#${fid})"/>`;
    }
    former += `<circle cx="${60 + r() * 300}" cy="${40 + r() * 120}" r="${12 + r() * 10}" fill="#ffffff" opacity=".9"/>`;
  } else {                        // PRIKKER + BÅND
    for (let x = 20; x < 420; x += 34) for (let y = 18; y < 210; y += 34)
      if (r() > .35) former += `<circle cx="${x}" cy="${y}" r="${1.6 + r() * 2.6}" fill="#ffffff" opacity="${.25 + r() * .4}"/>`;
    const bx = r() * 240;
    former += `<rect x="${bx}" y="-40" width="${46 + r() * 60}" height="320" rx="24" fill="${c3}" opacity=".85" transform="rotate(${18 + r() * 14} ${bx} 100)"/>`;
  }

  // stort "spøgelsesbogstav" fra rubrikken som grafisk element
  const bogstav = (a.rubrik || a.titel || "A").trim()[0].toUpperCase();
  const ghost = `<text x="${330 + r() * 40}" y="${185 + r() * 25}" font-family="Fraunces, Georgia, serif"
      font-size="${150 + r() * 60}" font-weight="900" fill="#ffffff" opacity=".14"
      text-anchor="middle">${bogstav}</text>`;

  return `<svg viewBox="0 0 400 225" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(${h % 90} .5 .5)">
        <stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/>
      </linearGradient>
      <filter id="${fid}" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="14"/></filter>
    </defs>
    <rect width="400" height="225" fill="url(#${gid})"/>
    ${former}${ghost}
  </svg>`;
}

/* ---------- Hjælpere ---------- */

function relativTid(iso) {
  if (!iso) return "";
  const min = Math.round((Date.now() - new Date(iso).getTime()) / 60000);
  if (min < 1) return "lige nu";
  if (min < 60) return `for ${min} min. siden`;
  const t = Math.round(min / 60);
  if (t < 24) return `for ${t} ${t === 1 ? "time" : "timer"} siden`;
  const d = Math.round(t / 24);
  if (d < 7) return `for ${d} ${d === 1 ? "dag" : "dage"} siden`;
  return new Date(iso).toLocaleDateString("da-DK", { day: "numeric", month: "short" });
}
function esc(s) { const d = document.createElement("div"); d.textContent = s ?? ""; return d.innerHTML; }
function overskrift(a) { return a.rubrik ? esc(a.rubrik) : esc(a.titel) + '<span class="en-chip">EN</span>'; }
function brodtekst(a) {
  if (a.resume_da) return esc(a.resume_da);
  const t = a.resume || "";
  return esc(t.length > 140 ? t.slice(0, 140).split(" ").slice(0, -1).join(" ") + "…" : t);
}

/* ---------- Rendering ---------- */

const KATEGORI_ORDEN = ["Lanceringer", "Benchmarks", "Hverdags-AI", "Penge & marked",
                        "Politik & jura", "Samfund & etik", "Forskning"];

function tegnFiltre() {
  const fundne = [...new Set(artikler.map(a => a.kategori))];
  fundne.sort((a, b) => {
    const ia = KATEGORI_ORDEN.indexOf(a), ib = KATEGORI_ORDEN.indexOf(b);
    return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
  });
  const kategorier = ["Alle", ...fundne];
  filtreEl.innerHTML = kategorier.map(k =>
    `<button class="pill ${k === aktivKategori ? "aktiv" : ""}" data-kategori="${esc(k)}">${esc(k)}</button>`).join("");
}

function dagNoegle(iso) {
  if (!iso) return "Ældre";
  const d = new Date(iso);
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function dagEtiket(noegle) {
  if (noegle === "Ældre") return "Ældre";
  const iDag = dagNoegle(new Date().toISOString());
  const iGaar = dagNoegle(new Date(Date.now() - 86400000).toISOString());
  if (noegle === iDag) return "I dag";
  if (noegle === iGaar) return "I går";
  return new Date(noegle).toLocaleDateString("da-DK", { weekday: "long", day: "numeric", month: "long" })
    .replace(/^./, c => c.toUpperCase());
}

function prioAf(a) {
  // flerkilde-historier er per definition vigtigere
  return (a.prio ?? 5) + (a.andre && a.andre.length ? 1 : 0);
}

function filtrerede() {
  const q = sogeTekst.toLowerCase();
  const liste = artikler.filter(a =>
    (aktivKategori === "Alle" || a.kategori === aktivKategori) &&
    (!q || (a.titel + " " + (a.rubrik || "") + " " + (a.resume_da || a.resume) + " " +
            (a.brief || "") + " " + a.kilde).toLowerCase().includes(q)));
  if (sortering === "vigtigst") {
    liste.sort((x, y) =>
      dagNoegle(y.dato).localeCompare(dagNoegle(x.dato)) ||
      prioAf(y) - prioAf(x) ||
      new Date(y.dato || 0) - new Date(x.dato || 0));
  }
  return liste;
}

/* ---------- Læsevisning ---------- */

const laeserBag = document.getElementById("laeserBag");
const laeserBoks = document.getElementById("laeserBoks");

function aabnLaeser(a) {
  let briefHtml;
  if (a.brief) {
    briefHtml = a.brief.split(/\n\n+/).map(afsnit => `<p>${esc(afsnit)}</p>`).join("");
    if (a.detaljer && a.detaljer.length)
      briefHtml += `<div class="laeser-sektion">Detaljerne</div>
        <ul class="laeser-detaljer">${a.detaljer.map(d => `<li>${esc(d)}</li>`).join("")}</ul>`;
    if (a.betydning)
      briefHtml += `<div class="laeser-sektion">Hvad betyder det for dig?</div>
        <div class="laeser-betydning">${esc(a.betydning)}</div>`;
  } else {
    briefHtml = `<p>${brodtekst(a)}</p>
       <p class="laeser-note">Det komplette brief er på vej — det skrives automatisk,
       når AI-omskrivningen har behandlet artiklen. Indtil da kan du læse originalen herunder.</p>`;
  }

  const pointerHtml = (a.pointer && a.pointer.length)
    ? `<div class="laeser-pointer"><h4>Hovedpointer</h4>
       <ul>${a.pointer.map(p => `<li>${esc(p)}</li>`).join("")}</ul></div>` : "";

  laeserBoks.innerHTML = `
    <div class="laeser-art">${visuel(a, 8888)}
      <button class="laeser-luk" id="laeserLuk" aria-label="Luk">✕</button>
    </div>
    <div class="laeser-krop">
      <div class="kicker">${esc(a.kategori)} <span class="adskil">· ${esc(a.kilde)} · ${relativTid(a.dato)}</span></div>
      <h1>${a.rubrik ? esc(a.rubrik) : esc(a.titel)}</h1>
      <div class="laeser-indhold">
        <div class="laeser-brief">${briefHtml}</div>
        ${pointerHtml}
      </div>
      <div class="laeser-bund">
        <span class="laeser-note" style="margin:0">Genfortalt i egne ord · ${a.andre && a.andre.length ? "Dækket af " + (a.andre.length + 1) + " medier" : "Kilde: " + esc(a.kilde)}</span>
        <span style="display:flex;gap:8px;flex-wrap:wrap">
          <a class="kilde-knap" href="${esc(a.link)}" target="_blank" rel="noopener">${esc(a.kilde)} →</a>
          ${(a.andre || []).map(k => `<a class="kilde-knap" href="${esc(k.link)}" target="_blank" rel="noopener">${esc(k.kilde)} →</a>`).join("")}
        </span>
      </div>
    </div>`;
  laeserBag.classList.add("aaben");
  laeserBag.scrollTop = 0;
  document.body.style.overflow = "hidden";
  document.getElementById("laeserLuk").addEventListener("click", lukLaeser);
}

function lukLaeser() {
  laeserBag.classList.remove("aaben");
  document.body.style.overflow = "";
}
laeserBag.addEventListener("click", e => { if (e.target === laeserBag) lukLaeser(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") lukLaeser(); });

// Klik på en historie åbner læseren i stedet for at sende os væk
indhold.addEventListener("click", e => {
  const kort = e.target.closest(".kort, .raekke, .hero, .mini-hero");
  if (!kort) return;
  e.preventDefault();
  const a = artikler.find(x => x.link === kort.dataset.link);
  if (a) aabnLaeser(a);
});

function kortHtml(a, id, stor = false) {
  return `
  <a class="kort ${stor ? "stor" : ""}" href="${esc(a.link)}" data-link="${esc(a.link)}" style="animation-delay:${Math.min(id * 30, 500)}ms">
    <div class="kort-art">${visuel(a, id)}${artOverlay(a)}</div>
    <div class="kort-krop">
      <h2>${a.rubrik ? esc(a.rubrik) : esc(a.titel)}</h2>
      <p>${brodtekst(a)}</p>
    </div>
  </a>`;
}

function artChips(a) {
  let c = "";
  if ((a.prio ?? 0) >= 8) c += '<span class="vigtig-chip">★ Vigtig</span>';
  if (a.andre && a.andre.length) c += `<span class="flere-chip">+${a.andre.length} kilder</span>`;
  if (!a.rubrik) c += '<span class="en-chip">EN</span>';
  return c ? `<div class="art-chips">${c}</div>` : "";
}

function artOverlay(a) {
  return artChips(a) + `<span class="tid-pille">${relativTid(a.dato)}</span>`;
}

function raekkeHtml(a, id) {
  return `
  <a class="raekke" href="${esc(a.link)}" data-link="${esc(a.link)}" style="animation-delay:${Math.min(id * 12, 350)}ms">
    <div class="raekke-billede">${visuel(a, id)}${artOverlay(a)}</div>
    <div class="raekke-tekst">
      <h3>${a.rubrik ? esc(a.rubrik) : esc(a.titel)}</h3>
    </div>
  </a>`;
}

function fmt(v, dec = 0, enhed = "") {
  return (v === null || v === undefined) ? "–" : v.toFixed(dec) + enhed;
}

function tegnBench() {
  document.querySelector(".filtre").style.display = "none";
  document.getElementById("sortSkift").style.display = "none";
  if (!benchData) {
    indhold.innerHTML = `<div class="tom">Benchmark-tallene er på vej 📊<br><br>
      De hentes automatisk fra Artificial Analysis, når <code>AA_API_KEY</code>-secret'en er sat i GitHub
      og næste opdatering har kørt.</div>`;
    return;
  }
  const q = sogeTekst.toLowerCase();
  let rk = benchData.modeller.filter(m => !q || (m.navn + " " + m.udbyder).toLowerCase().includes(q));
  const f = benchSort.felt, r = benchSort.retning;
  rk.sort((a, b) => ((a[f] ?? -Infinity) - (b[f] ?? -Infinity)) * r ||
                    String(a.navn).localeCompare(String(b.navn)));
  const pil = felt => felt === f ? `<span class="pil">${r < 0 ? "▼" : "▲"}</span>` : "";
  indhold.innerHTML = `
  <div class="bench-kort">
    <table class="bench-tabel">
      <thead><tr>
        <th data-felt="navn">Model</th>
        <th data-felt="indeks">Intelligens ${pil("indeks")}</th>
        <th data-felt="hastighed">Hastighed ${pil("hastighed")}</th>
        <th data-felt="pris_ind">Pris ind /M ${pil("pris_ind")}</th>
        <th data-felt="pris_ud">Pris ud /M ${pil("pris_ud")}</th>
      </tr></thead>
      <tbody>${rk.map((m, i) => `
        <tr>
          <td><span class="bench-navn ${i < 3 && f === "indeks" && r < 0 ? "bench-top" : ""}">${i < 3 && f === "indeks" && r < 0 ? ["🥇 ", "🥈 ", "🥉 "][i] : ""}${esc(m.navn)}</span><br><span class="bench-udbyder">${esc(m.udbyder)}</span></td>
          <td class="bench-indeks">${fmt(m.indeks, 1)}</td>
          <td>${fmt(m.hastighed, 0, " tokens/s")}</td>
          <td>${fmt(m.pris_ind, 2, " $")}</td>
          <td>${fmt(m.pris_ud, 2, " $")}</td>
        </tr>`).join("")}
      </tbody>
    </table>
    <div class="bench-kredit">Data: <a href="https://artificialanalysis.ai" target="_blank" rel="noopener"><img src="assets/aa_logo.svg" alt="Artificial Analysis" style="height:15px;vertical-align:-3px"></a>
      · Opdateret ${new Date(benchData.opdateret).toLocaleString("da-DK", { day: "numeric", month: "long", hour: "2-digit", minute: "2-digit" })}
      · Intelligens = samlet indeks på tværs af sværeste tests · Pris pr. mio. tokens</div>
  </div>`;
  document.querySelectorAll(".bench-tabel th").forEach(th =>
    th.addEventListener("click", () => {
      const felt = th.dataset.felt;
      benchSort.retning = benchSort.felt === felt ? -benchSort.retning : (felt === "navn" ? 1 : -1);
      benchSort.felt = felt;
      tegnBench();
    }));
}

function tegn() {
  if (visning === "benchmarks") { tegnBench(); return; }
  document.querySelector(".filtre").style.display = "";
  document.getElementById("sortSkift").style.display = "";
  const liste = filtrerede();
  if (!liste.length) { indhold.innerHTML = `<div class="tom">Ingen historier matcher 🤷</div>`; return; }

  const paaDansk = artikler.filter(a => a.rubrik).length;
  const note = paaDansk === 0 ? `<div class="note">🔑 AI-omskrivningen er ikke aktiveret endnu — historierne vises på engelsk.
      Tilføj en <code>ANTHROPIC_API_KEY</code>-secret i GitHub, så oversætter siden sig selv ved næste opdatering.</div>` : "";

  // Hero = nyeste historie med dansk rubrik (ellers bare den nyeste)
  const heroArtikel = liste.find(a => a.rubrik) || liste[0];
  const rest = liste.filter(a => a !== heroArtikel);

  if (visning === "kompakt") {
    // ---- OVERBLIK: slank hero + tæt tavle (resumé foldes ud ved hover) ----
    const miniHero = `
    <a class="mini-hero" href="${esc(heroArtikel.link)}" data-link="${esc(heroArtikel.link)}">
      <div class="mini-hero-art">${visuel(heroArtikel, 9999)}</div>
      <div class="mini-hero-tekst">
        <div class="kicker">Dagens historie <span class="adskil">· ${esc(heroArtikel.kategori)} · ${esc(heroArtikel.kilde)} · ${relativTid(heroArtikel.dato)}</span>${heroArtikel.andre && heroArtikel.andre.length ? `<span class="flere-chip">+${heroArtikel.andre.length} kilder</span>` : ""}</div>
        <h1>${overskrift(heroArtikel)}</h1>
        <p>${brodtekst(heroArtikel)}</p>
      </div>
    </a>`;
    let krop;
    if (sortering === "vigtigst") {
      // sektion pr. dag med de vigtigste øverst i hver dag
      const dage = [];
      for (const a of rest) {
        const n = dagNoegle(a.dato);
        if (!dage.length || dage[dage.length - 1].noegle !== n) dage.push({ noegle: n, artikler: [] });
        dage[dage.length - 1].artikler.push(a);
      }
      let id = 0;
      krop = dage.map(d =>
        `<div class="sektion-titel">${dagEtiket(d.noegle)}</div>
         <div class="tavle" style="margin-bottom:26px">${d.artikler.map(a => raekkeHtml(a, id++)).join("")}</div>`).join("");
    } else {
      krop = `<div class="tavle">${rest.map((a, i) => raekkeHtml(a, i)).join("")}</div>`;
    }
    indhold.innerHTML = note + miniHero + krop;
    return;
  }

  // ---- MAGASIN: stor hero + mosaik-kort ----
  const hero = `
  <a class="hero" href="${esc(heroArtikel.link)}" data-link="${esc(heroArtikel.link)}">
    <div class="hero-art">${visuel(heroArtikel, 9999)}</div>
    <div class="hero-tekst">
      <div class="kicker">Dagens historie <span class="adskil">· ${esc(heroArtikel.kategori)} · ${esc(heroArtikel.kilde)}</span>${heroArtikel.andre && heroArtikel.andre.length ? `<span class="flere-chip">+${heroArtikel.andre.length} kilder</span>` : ""}</div>
      <h1>${overskrift(heroArtikel)}</h1>
      <p>${brodtekst(heroArtikel)}</p>
      <div class="meta"><span>${relativTid(heroArtikel.dato)}</span><span class="laes">Læs hele historien</span></div>
    </div>
  </a>`;

  let magKrop;
  if (sortering === "vigtigst") {
    const dage = [];
    for (const a of rest) {
      const n = dagNoegle(a.dato);
      if (!dage.length || dage[dage.length - 1].noegle !== n) dage.push({ noegle: n, artikler: [] });
      dage[dage.length - 1].artikler.push(a);
    }
    let id = 0;
    magKrop = dage.map(d =>
      `<div class="sektion-titel">${dagEtiket(d.noegle)}</div>
       <div class="grid" style="margin-bottom:30px">${d.artikler.map(a => kortHtml(a, id++, !!(a.andre && a.andre.length))).join("")}</div>`).join("");
  } else {
    magKrop = `<div class="sektion-titel">Seneste historier</div><div class="grid">${rest.map((a, i) => kortHtml(a, i, !!(a.andre && a.andre.length))).join("")}</div>`;
  }
  indhold.innerHTML = note + hero + magKrop;
}

const tip = document.getElementById("tip");

indhold.addEventListener("mouseover", e => {
  const kort = e.target.closest(".raekke, .kort");
  if (!kort || !kort.dataset.link) return;
  const a = artikler.find(x => x.link === kort.dataset.link);
  if (!a) return;
  tip.innerHTML = `<div class="tip-kilde">${esc(a.kilde)}</div>${brodtekst(a)}`;
  const r = kort.getBoundingClientRect();
  tip.style.left = Math.min(r.left, innerWidth - 400) + "px";
  // under kortet hvis der er plads, ellers over
  tip.style.top = (r.bottom + 130 < innerHeight ? r.bottom + 8 : Math.max(8, r.top - tip.offsetHeight - 8)) + "px";
  tip.classList.add("synlig");
});
indhold.addEventListener("mouseout", e => {
  if (e.target.closest(".raekke, .kort")) tip.classList.remove("synlig");
});
indhold.addEventListener("click", () => tip.classList.remove("synlig"), true);

fetch("data/benchmarks.json")
  .then(r => r.ok ? r.json() : null)
  .then(d => { benchData = d; if (visning === "benchmarks") tegn(); })
  .catch(() => {});

fetch("data/articles.json")
  .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(data => {
    artikler = data.artikler;
    tegnFiltre(); tegn();
  })
  .catch(fejl => {
    indhold.innerHTML = `<div class="tom">Kunne ikke hente nyhederne (${esc(fejl.message)}).<br><br>
      Kør <code>python3 crawler.py</code> og åbn siden via <code>python3 -m http.server</code>.</div>`;
  });
</script>
