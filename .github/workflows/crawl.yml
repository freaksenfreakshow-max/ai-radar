# =====================================================================
# Automatisk crawl af AI-nyheder
# ---------------------------------------------------------------------
# Koerer paa GitHubs servere (gratis):
#   1. crawler.py hver 6. time: crawl + AI-omskrivning + dybe briefs
#   2. Committer data/articles.json til main
#   3. GitHub Pages serverer automatisk den nye version
#
# AI-omskrivning kraever EN af disse repository secrets:
#   ANTHROPIC_API_KEY (Claude)  eller  GEMINI_API_KEY (Gemini, har gratis-niveau)
# Er begge sat, vinder Claude - skift med repository variable AI_UDBYDER=gemini
# =====================================================================

name: Crawl AI-nyheder

on:
  schedule:
    - cron: "0 */6 * * *"   # hver 6. time (UTC)
  workflow_dispatch:         # goer det muligt at koere den manuelt
  push:
    branches: [main]         # koer ogsaa ved push, saa siden altid har friske data

permissions:
  contents: write            # workflow'en skal have lov at committe data-filen

concurrency:
  group: crawl
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Hent koden
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Koer crawleren (AI-omskrivning hvis en noegle findes)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AA_API_KEY: ${{ secrets.AA_API_KEY }}
          AI_UDBYDER: ${{ vars.AI_UDBYDER }}
        run: |
          pip install pillow -q
          python3 crawler.py

      - name: Commit de nye artikler
        run: |
          git config user.name "ai-news-bot"
          git config user.email "actions@github.com"
          git add data
          git diff --staged --quiet || git commit -m "Automatisk opdatering af nyheder"
          git push
